//Ens Main config.

//3 comma seperated host, databaseName, user

sqlDb.info=localhost,enigmadb,euser

//These help the software generate the 
//Correct password.  It could
//be configured to reach other servers
//to retrieve additional information, 
//or even use Machine specific unique
//Id like HostName, VM_ID, IP Address etc.
//For dev it just uses the host name.
//
// NEVER commit real keyBasis values. Supply via a local ens.cfg
// that is not checked in, or inject at deploy time.

sqlDb.keyFile=ensDb.key
sqlDb.keyBasis=REPLACE_WITH_LOCAL_KEY_BASIS
//min,opt,max
sqlDb.pool=1,5,30

//Optional..
enigmaAuthDisable=false

//Fill this if automatic process host name is not working..
//Put this temporarily and find why automatic stuff does not work.
host.name=
// Keep false in production — query text can contain sensitive data.
sqlDb.queryDebug=false

// Beech/Lucene debug filter. Keep false in production.
beech.luceneDebug=false

//The Parent class is initialized to be the Solder.
ens.parent=org.solder.ens.SolderEnsInit

